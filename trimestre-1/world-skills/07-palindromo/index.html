<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel=Stylesheet href="style.css">
    <title>Palindromo</title>
</head>
<body>
    <div class="container">
        <div class="container__word">
            <h1 class="titulo-palindromo">Palindromos!</h1>

            <p class="definicion-palindromos">
                Los palindromos son palabras u oraciones que se leen
                de la misma forma tanto de derecha a izquierda como de
                izquierda a derecha.
                <br><br>
                Ejemplo: Oso, Oro, Anita Lava La Tina...
            </p>
            <input type="text" class="word" placeholder="Ingrese la palabra...">
            <button class="btn">Revisar</button>
            <p class="resultado"></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
