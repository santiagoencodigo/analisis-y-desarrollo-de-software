<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquetacion 2</title>

    <style>
        * {

            box-sizing: border-box; 
        }

        body { 
            margin: 0; 
        }

        main {
            display: flex;
            flex-direction: row;
            width: 100%;
        }


        .azul { 
            background-color: #5D9CDE; 
            height: 80px; 
            border: 2px solid black; 
        }


        .rojo { 
            background-color: #F05F57; 
            height: 350px; 
            border: 2px solid black; 
            width: 33.33%;
        }


        .morado { 
            background-color: #9B7CC3; 
            height: 350px; 
            border: 2px solid black; 
            width: 33.33%;
        }


        .naranja { 
            background-color: #FFAD4F; 
            height: 80px; 
            border: 2px solid black; 
        }
    </style>
</head>
<header>
    <div class="azul"></div>
</header>

<main>
    <div class="morado"></div>
    <div class="rojo"></div>
    <div class="morado"></div>
</main>

<footer>
    <div class="naranja"></div>
</footer>

</body>
</html>
