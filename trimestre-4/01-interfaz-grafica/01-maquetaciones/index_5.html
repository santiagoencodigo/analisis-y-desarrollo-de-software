<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquetacion 5</title>

    <style>
        * {
           margin: 0px;
            padding: 0px;
        }

        main {
            display: flex;
            flex-direction: row;
        }

        .caja {
            width: 90%;
            height: 600%;
        }

        .blue {
            display: flex;
            flex-direction: row;
        }

        .uno {
            background: lightblue;
            width: 20%;
            height: 100px;
        }

        .dos {
            background: rgb(142, 174, 179);
            width: 80%;
            height: 100px;
        }

        .tres {
            /* position: relative; */
            background: purple;
            width: 100%;
            height: 603px;

            /* border: 0.5px solid black; */
        }

        .rojo {
            background: rgb(233, 134, 134);
            width: 10%;
            height: 701px;

            border: 1px solid black;
        }

        footer {
            width: 100%;
            height: 100px;
            
            display: flex;
            flex-direction: row;
        }

        .amarillo {
            background: rgb(225, 225, 49);
            width: 33.33%;
            height: 100%;

            border: 1px solid black;
        }
    </style>
</head>
<body>
    <main>
        <div class="caja">
            <div class="blue">
                <div class="uno"></div>
                <div class="dos"></div>
            </div>

            <div class="tres"></div>
        </div>

        <div class="rojo"></div>
    </main>

    <footer>
        <div class="amarillo"></div>
        <div class="amarillo"></div>
        <div class="amarillo"></div>
    </footer>
</body>
</html>
