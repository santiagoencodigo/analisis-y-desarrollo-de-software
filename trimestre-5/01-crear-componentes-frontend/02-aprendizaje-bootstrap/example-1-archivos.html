<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Toast Profesional</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h3>Lista de archivos</h3>

  <!-- BOTÓN SIMULANDO ELIMINAR -->
  <button class="btn btn-danger" id="eliminarBtn">
    Eliminar archivo
  </button>

</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3">

  <div id="toastUndo" class="toast text-bg-dark border-0">

    <div class="d-flex">
      
      <div class="toast-body">
        Archivo eliminado
        <button class="btn btn-sm btn-light ms-3" id="undoBtn">
          Deshacer
        </button>
      </div>

      <button class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"></button>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

  const eliminarBtn = document.getElementById("eliminarBtn");
  const undoBtn = document.getElementById("undoBtn");
  const toastElement = document.getElementById("toastUndo");

  const toast = new bootstrap.Toast(toastElement, {
    delay: 5000 // se oculta en 5 segundos
  });

  let eliminado = false;

  // Evento eliminar
  eliminarBtn.addEventListener("click", () => {
    eliminado = true;
    console.log("Archivo eliminado");

    toast.show();
  });

  // Evento deshacer
  undoBtn.addEventListener("click", () => {
    if (eliminado) {
      eliminado = false;
      console.log("Acción deshecha");

      alert("Se restauró el archivo");
    }
  });

</script>

</body>
</html>
