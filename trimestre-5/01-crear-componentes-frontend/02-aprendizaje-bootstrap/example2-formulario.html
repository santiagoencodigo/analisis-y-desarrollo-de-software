<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario con Toast</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h2 class="mb-4">Formulario de contacto</h2>

  <!-- FORMULARIO -->
  <form id="miFormulario">

    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input type="text" id="nombre" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="correo" class="form-label">Correo</label>
      <input type="email" id="correo" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">
      Enviar
    </button>

  </form>

</div>

<!-- CONTENEDOR DEL TOAST-->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 11">

  <!-- TOAST -->
  <div id="miToast" class="toast align-items-center text-bg-success border-0" role="alert">

    <div class="d-flex">
      
      <div class="toast-body">
        ✅ Formulario enviado correctamente
      </div>

      <button type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast">
      </button>

    </div>

  </div>

</div>

<!-- Bootstrap JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script>

  // Seleccionar elementos
  const formulario = document.getElementById("miFormulario");
  const toastElemento = document.getElementById("miToast");

  // Crear instancia del Toast
  const toast = new bootstrap.Toast(toastElemento);

  // Evento al enviar el formulario
  formulario.addEventListener("submit", function(e) {

    // Evita recargar la página
    e.preventDefault();

    // Mostrar el toast
    toast.show();

    // Limpiar el formulario
    formulario.reset();

  });

</script>

</body>
</html>
