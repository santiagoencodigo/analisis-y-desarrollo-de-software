<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimestre 5 | santiagoencodigo</title>

    <style>
        /* Reset Básico */

        * {
            margin: 0;
            padding: 0;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        header {
            margin:5px;

            background-color: lightblue;
            border:1px solid darkblue;

            width:100%;
            height:200px;

            
            display: flex;
            flex-direction: column;
            align-items: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav {
            margin: 5px;

            background-color: lightgreen;
            border:1px solid green;

            width:100%;
            height:100px;


            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #section1 {

            color: white;
            margin:5px;
            background-color: purple;

            width:100%;
            height: 300px;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .div_section1 {
            display:flex;
            flex-direction: row;
            width:100%;
        }

        article {
            padding: 100px;
            border:1px solid red;
            background-color: orange;
            margin:5px;       
        }

        #article1 {
            width: 50%;
            height: 50px;

            float: left;
        }

        #article2 {
            width: 30%;
            height: 50px;
            float: left;
        }

        #section2 {

            color: white;
            margin:5px;
            background-color: purple;

            width:100%;
            height: 300px;
            
            display: flex;
            flex-direction: column;
            align-items: start;
            justify-content: center;
        }

        #article3 {
            width: 70%;
            height: 50px;
            justify-content: start;            
        }

        footer {
            margin:5px;

            background-color: gray;
            border:1px solid darkgrey;

            width:100%;
            height:50px;

            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }            
    </style>


</head>
<body>
    <main>        
        <header><p>header</p></header>
        <nav><p>nav</p></nav>
        <section id = "section1">
            <p>section</p>
            <div class="div_section1">
                <article id = "article1">article</article>
                <article id = "article2">article</article>
            </div>
        </section>

        <section id = "section2">
            <p>section</p>
            <article id = "article3">article</article>
        </section>

        <footer><p>footer</p></footer>    
    </main>
</body>
</html>
