<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo | login | santiagoencodigo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
<body class="bg-info">
    <!-- Contenedor principal -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="row w-100">
            <div class="col-md-4 offset-md-4 p-4 border rounded bg-white shadow">
                
                <!-- Imagen de usuario -->
                <div class="text-center">
                    <img src="../../../trimestre-4/01-interfaz-grafica/code/proyecto-13-marzo-2026/img/1-person-icon.svg" class="rounded-circle border border-secondary p-1" alt="Usuario" style="width: 300px;">
                </div>
                <h2 class="text-center text-primary mt-3">Iniciar Sesión</h2>
                <!-- Formulario -->
                <form class="mt-3">
                    <div class="mb-3">
                        <label class="form-label text-dark">Usuario</label>
                        <input type="text" class="form-control border border-secondary" placeholder="Ingresa tu usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-dark">Contraseña</label>
                        <input type="password" class="form-control border border-secondary" placeholder="Ingresa tu contraseña">
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </div>
                </form>
                <!-- Pie de página -->
                <div class="text-center mt-3">
                    <p class="text-muted">¿No tienes cuenta? <a href="#" class="text-primary">Regístrate</a></p>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
