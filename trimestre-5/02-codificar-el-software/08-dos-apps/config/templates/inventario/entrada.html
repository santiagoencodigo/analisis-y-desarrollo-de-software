{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

   <div class="card-body">

       <h3 class="mb-4">
           Entrada Inventario
       </h3>

       <form method="POST">

           {% csrf_token %}

           {{ form.as_p }}

           <button type="submit"
                   class="btn btn-success">

               Registrar Entrada

           </button>

           <a href="{% url 'lista_productos' %}"
              class="btn btn-secondary">

               Volver

           </a>

       </form>

   </div>

</div>

{% endblock %}
